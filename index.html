<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ronnie & Krista — Geregistreerd Partnerschap</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #c9a84c;
      --gold-light: #e8d08a;
      --gold-dark: #8a6a1f;
      --cream: #fdf8f0;
      --deep: #1a1209;
      --blush: #f0d9c8;
    }

    html, body {
      height: 100%;
      background: var(--deep);
      font-family: 'Cormorant Garamond', serif;
      overflow-x: hidden;
      cursor: default;
    }

    /* Starfield */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--d) ease-in-out infinite alternate;
      opacity: 0;
    }
    @keyframes twinkle {
      from { opacity: 0; transform: scale(0.8); }
      to   { opacity: var(--op); transform: scale(1.2); }
    }

    /* Floating petals */
    .petal {
      position: fixed;
      top: -40px;
      font-size: 1.2rem;
      animation: fall linear infinite;
      opacity: 0.6;
      pointer-events: none;
      z-index: 1;
    }
    @keyframes fall {
      0%   { transform: translateY(-40px) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* Main content */
    .page {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      text-align: center;
    }

    /* Ornament top */
    .ornament {
      font-size: 2rem;
      color: var(--gold);
      letter-spacing: 0.3em;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 1.2s 0.3s forwards ease-out;
    }

    .date-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold-light);
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 1.2s 0.6s forwards ease-out;
    }

    .names {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3.5rem, 10vw, 7rem);
      color: var(--cream);
      line-height: 1.05;
      letter-spacing: -0.01em;
      opacity: 0;
      animation: fadeUp 1.4s 0.9s forwards ease-out;
    }
    .names em {
      font-style: italic;
      color: var(--gold-light);
    }
    .ampersand {
      display: block;
      font-size: clamp(2rem, 6vw, 4rem);
      color: var(--gold);
      margin: 0.1em 0;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      margin: 2.5rem auto;
      width: min(500px, 90vw);
      opacity: 0;
      animation: fadeUp 1.2s 1.3s forwards ease-out;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
    }
    .divider-diamond {
      color: var(--gold);
      font-size: 1.2rem;
    }

    .subtitle {
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      color: var(--blush);
      font-style: italic;
      font-weight: 300;
      letter-spacing: 0.08em;
      max-width: 500px;
      line-height: 1.7;
      opacity: 0;
      animation: fadeUp 1.2s 1.6s forwards ease-out;
    }

    /* Music player */
    .player-wrap {
      margin-top: 3rem;
      opacity: 0;
      animation: fadeUp 1.2s 2s forwards ease-out;
    }
    .player-label {
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
    }
    .player-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 1.5px solid var(--gold);
      background: transparent;
      color: var(--gold);
      font-size: 1.4rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto;
      box-shadow: 0 0 20px rgba(201,168,76,0.2);
    }
    .player-btn:hover {
      background: rgba(201,168,76,0.15);
      box-shadow: 0 0 30px rgba(201,168,76,0.5);
      transform: scale(1.05);
    }
    .player-status {
      margin-top: 0.8rem;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      color: var(--gold-light);
      opacity: 0.7;
      min-height: 1.2em;
    }

    /* Progress bar */
    .progress-wrap {
      margin-top: 1.2rem;
      width: 200px;
      height: 2px;
      background: rgba(201,168,76,0.2);
      border-radius: 2px;
      overflow: hidden;
      margin-left: auto;
      margin-right: auto;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(to right, var(--gold-dark), var(--gold-light));
      border-radius: 2px;
      transition: width 0.5s linear;
    }

    /* Bottom ornament */
    .bottom-ornament {
      margin-top: 3.5rem;
      font-size: 1.5rem;
      color: var(--gold-dark);
      letter-spacing: 0.5em;
      opacity: 0;
      animation: fadeUp 1.2s 2.3s forwards ease-out;
    }

    /* Easter egg cards */
    .egg-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10,6,2,0.7);
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .egg-overlay.show {
      opacity: 1;
      pointer-events: all;
    }
    .egg-card {
      background: linear-gradient(135deg, #1e1408, #2e1f0a);
      border: 1px solid var(--gold);
      border-radius: 16px;
      padding: 2.5rem 3rem;
      max-width: 340px;
      width: 90vw;
      text-align: center;
      box-shadow: 0 0 60px rgba(201,168,76,0.3);
      transform: scale(0.85);
      transition: transform 0.3s ease;
      cursor: pointer;
    }
    .egg-overlay.show .egg-card {
      transform: scale(1);
    }
    .egg-card .egg-tag {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
    }
    .egg-card .egg-question {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--cream);
      font-style: italic;
      margin-bottom: 1.5rem;
      line-height: 1.4;
    }
    .egg-card .egg-answer {
      font-size: 1rem;
      color: var(--gold-light);
      letter-spacing: 0.05em;
      display: none;
      margin-top: 0.5rem;
    }
    .egg-card .egg-hint {
      font-size: 0.72rem;
      color: var(--gold-dark);
      letter-spacing: 0.2em;
      margin-top: 1.5rem;
    }
    .egg-card.revealed .egg-answer { display: block; }
    .egg-card.revealed .egg-hint { display: none; }
    .egg-close {
      position: absolute;
      top: 1rem; right: 1.2rem;
      color: var(--gold-dark);
      font-size: 1.2rem;
      cursor: pointer;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Glow pulse on names */
    .names-glow {
      text-shadow: 0 0 60px rgba(201,168,76,0.15);
    }

    /* Candlelight background glow */
    .glow-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 60%, rgba(140,90,20,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 30% 80%, rgba(180,80,30,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 70% 20%, rgba(180,130,30,0.06) 0%, transparent 60%);
      pointer-events: none;
    }
    /* Lyrics button */
    .lyrics-btn {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 50;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 0.6rem 1.3rem;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 15px rgba(201,168,76,0.15);
    }
    .lyrics-btn:hover {
      background: rgba(201,168,76,0.12);
      box-shadow: 0 0 25px rgba(201,168,76,0.35);
    }

    /* Lyrics modal */
    .lyrics-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10,6,2,0.85);
      backdrop-filter: blur(6px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }
    .lyrics-overlay.show {
      opacity: 1;
      pointer-events: all;
    }
    .lyrics-modal {
      background: linear-gradient(160deg, #1e1408, #2a1b08);
      border: 1px solid var(--gold-dark);
      border-radius: 16px;
      width: min(560px, 92vw);
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 80px rgba(201,168,76,0.2);
      transform: translateY(20px);
      transition: transform 0.35s ease;
    }
    .lyrics-overlay.show .lyrics-modal {
      transform: translateY(0);
    }
    .lyrics-header {
      padding: 1.3rem 1.8rem;
      border-bottom: 1px solid rgba(201,168,76,0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .lyrics-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      color: var(--gold-light);
      font-style: italic;
    }
    .lyrics-x {
      background: none;
      border: none;
      color: var(--gold-dark);
      font-size: 1.3rem;
      cursor: pointer;
      transition: color 0.2s;
      line-height: 1;
    }
    .lyrics-x:hover { color: var(--gold); }
    .lyrics-body {
      overflow-y: auto;
      padding: 1.8rem 2rem 2rem;
      font-family: 'Cormorant Garamond', serif;
      color: var(--cream);
      font-size: 1.05rem;
      line-height: 1.9;
      scrollbar-width: thin;
      scrollbar-color: var(--gold-dark) transparent;
    }
    .lyrics-body p { margin-bottom: 1.4rem; }
    .lyrics-body .chorus {
      color: var(--gold-light);
      font-style: italic;
      border-left: 2px solid var(--gold-dark);
      padding-left: 1rem;
    }
    .lyrics-body .lyric-line {
      padding: 0.3rem 0.5rem;
      border-radius: 6px;
      transition: all 0.4s ease;
      color: rgba(253,248,240,0);
      font-size: 1.05rem;
      line-height: 1.9;
      margin-bottom: 0.15rem;
    }
    .lyrics-body .lyric-line.chorus {
      color: rgba(232,208,138,0.35);
      font-style: italic;
      padding-left: 1rem;
      border-left: 2px solid rgba(138,106,31,0.3);
    }
    .lyrics-body .lyric-line.active {
      color: var(--cream) !important;
      text-shadow: 0 0 20px rgba(201,168,76,0.5);
      transform: scale(1.03);
      transform-origin: left center;
    }
    .lyrics-body .lyric-line.sung {
    color: rgba(253,248,240,0.35);
    }
    .lyrics-body .lyric-line.chorus.sung {
    color: rgba(232,208,138,0.35);
    }
    .lyrics-body .lyric-line.chorus.active {
      color: var(--gold-light) !important;
    }
  </style>
</head>
<body>

<div class="glow-bg"></div>
<canvas class="stars" id="stars"></canvas>
<div id="petals"></div>

<div class="page">
  <div class="ornament">✦ ✦ ✦</div>
  <div class="date-label">Geregistreerd Partnerschap</div>

  <div class="names names-glow">
    <em style="cursor:pointer" onclick="showEgg('ronnie')">Ronnie</em>
    <span class="ampersand">& </span>
    <em style="cursor:pointer" onclick="showEgg('krista')">Krista</em>
  </div>
  <div style="font-size:0.7rem; letter-spacing:0.2em; color:rgba(201,168,76,0.7); margin-top:0.8rem; font-style:italic; opacity:0; animation: fadeUp 1.2s 1.2s forwards ease-out;">psst… klik op een naam</div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-diamond">◆</div>
    <div class="divider-line"></div>
  </div>

  <div class="player-wrap">
    <div class="player-label">♪ Ons Lied</div>
    <button class="player-btn" id="playBtn" onclick="togglePlay()" title="Afspelen / Pauzeren">
      ▶
    </button>
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="player-status" id="playerStatus">Klik om te spelen</div>
  </div>

  <div class="bottom-ornament">✦ &nbsp; ✦ &nbsp; ✦</div>
</div>

<button class="lyrics-btn" onclick="openLyrics()">♪ Tekst</button>

<!-- Lyrics modal -->
<div class="lyrics-overlay" id="lyricsOverlay" onclick="closeLyricsOutside(event)">
  <div class="lyrics-modal">
    <div class="lyrics-header">
      <span class="lyrics-title">♪ Ons Lied — Ronnie & Krista</span>
      <button class="lyrics-x" onclick="closeLyrics()">✕</button>
    </div>
    <div class="lyrics-body" id="lyricsBody">
    </div>
  </div>
</div>

<!-- Verander 'muziek.mp3' naar de bestandsnaam van jouw mp3 -->
<!-- Easter egg overlay -->
<div class="egg-overlay" id="eggOverlay" onclick="closeEgg(event)">
  <div class="egg-card" id="eggCard" onclick="revealAnswer()">
    <div class="egg-tag">✦ ✦ ✦</div>
    <div class="egg-question" id="eggQuestion"></div>
    <div class="egg-answer" id="eggAnswer"></div>
    <div class="egg-hint">Klik op de kaart voor het antwoord</div>
  </div>
</div>

<audio id="audio" src="Liedje.mpeg" preload="auto"></audio>

<script>
  function openLyrics() { document.getElementById('lyricsOverlay').classList.add('show'); }
  function closeLyrics() { document.getElementById('lyricsOverlay').classList.remove('show'); }
  function closeLyricsOutside(e) { if (e.target === document.getElementById('lyricsOverlay')) closeLyrics(); }

  // Karaoke lyrics met timestamps (seconden)
  const lyricsData = [
    { t: 8,   text: "Zeven jaar geleden, weet je 't nog misschien?", chorus: false },
    { t: 11,  text: "Daar bij de zumba hadden jullie 't al gezien.", chorus: false },
    { t: 14,  text: "Heerenveen, Hoogeveen wat maakt 't uit.", chorus: false },
    { t: 17,  text: "Zolang jullie samen zijn boeit het geen fluit.", chorus: false },
    { t: 21,  text: "Toen was het officieel, wat geniaal.", chorus: false },
    { t: 25,  text: "Nu zijn we dubbel familie allemaal!", chorus: false },
    { t: 28,  text: "Ook nog vrienden, dubbel zo fijn,", chorus: false },
    { t: 31,  text: "Met jullie samen, is alles één groot festijn!", chorus: false },
    { t: 36,  text: "Ronnie en Krista — Hey!", chorus: true },
    { t: 39,  text: "Wat zijn we trots op jullie twee!", chorus: true },
    { t: 43,  text: "Eindelijk de volgende stap", chorus: true },
    { t: 46,  text: "Tot een officieel partnerschap", chorus: true },
    { t: 50,  text: "Lachen, dansen, hee hee!", chorus: true },
    { t: 53,  text: "Dan roepen wij, olé!", chorus: true },
    { t: 60,  text: "Naar een pretpark? Let op de dag.", chorus: false },
    { t: 64,  text: "Want anders sta je daar met je goede gedrag.", chorus: false },
    { t: 67,  text: "Datum checken, extra vaak.", chorus: false },
    { t: 70,  text: "Dat is nu niet meer Kris haar taak.", chorus: false },
    { t: 74,  text: "Ron hoort niet alles, soms mist hij het begin,", chorus: false },
    { t: 77,  text: "\"Hè, wat zeg je?\" roept hij dan middenin.", chorus: false },
    { t: 80,  text: "We blijven ons herhalen, altijd fijn.", chorus: false },
    { t: 83,  text: "Ach ja… je zou maar een boomer zijn.", chorus: false },
    { t: 89,  text: "Ronnie en Krista — Hey!", chorus: true },
    { t: 92,  text: "Wat zijn we trots op jullie twee!", chorus: true },
    { t: 96,  text: "Eindelijk de volgende stap", chorus: true },
    { t: 99,  text: "Tot een officieel partnerschap", chorus: true },
    { t: 102, text: "Lachen, dansen, hee hee!", chorus: true },
    { t: 105, text: "Dan roepen wij, olé!", chorus: true },
    { t: 112, text: "En in mei komt er nóg meer feestgedruis,", chorus: false },
    { t: 115, text: "Een klein meisje brengt meer leven in huis!", chorus: false },
    { t: 119, text: "Mini-stapjes, roze chaos misschien,", chorus: false },
    { t: 122, text: "Maar wat een geluk om dat samen te zien!", chorus: false },
    { t: 127, text: "Flesjes, luiers, korte nachten — ach ja,", chorus: false },
    { t: 131, text: "Met jullie twee wordt dat helemaal prima!", chorus: false },
    { t: 134, text: "En wordt het chaos of gaat het even mis,", chorus: false },
    { t: 137, text: "Dan staan wij klaar… mits het niet elke zaterdag is.", chorus: false },
    { t: 145, text: "Ronnie en Krista — Hey!", chorus: true },
    { t: 149, text: "Straks met z'n drietjes, olé olé!", chorus: true },
    { t: 152, text: "Dubbel familie wordt nog meer,", chorus: true },
    { t: 155, text: "Met een mini erbij, wat een sfeer!", chorus: true },
    { t: 158, text: "Wij wensen alle geluk en liefde toe", chorus: true },
    { t: 162, text: "Met jullie gezinnetje zonder gedoe", chorus: true },
    { t: 166, text: "Dus blijf elkaar die liefde geven.", chorus: true },
    { t: 169, text: "Ronnie en Krista, lang zullen leven!", chorus: true },
  ];

  // Bouw karaoke regels in de modal
  const lyricsBody = document.getElementById('lyricsBody');
  lyricsData.forEach((line, i) => {
    const el = document.createElement('div');
    el.className = 'lyric-line' + (line.chorus ? ' chorus' : '');
    el.id = 'line-' + i;
    el.textContent = line.text;
    lyricsBody.appendChild(el);
  });

  let activeLine = -1;
  function updateKaraoke() {
    const t = audio.currentTime;
    let current = -1;
    for (let i = lyricsData.length - 1; i >= 0; i--) {
      if (t >= lyricsData[i].t) { current = i; break; }
    }
    if (current !== activeLine) {
      if (activeLine >= 0) {
        const old = document.getElementById('line-' + activeLine);
        old?.classList.remove('active');
        old?.classList.add('sung');
        }
      if (current >= 0) {
        const el = document.getElementById('line-' + current);
        el?.classList.add('active');
        el?.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
      activeLine = current;
    }
  }

  // Easter eggs
  const eggs = {
    ronnie: {
      question: "Hoe wordt Ronnie ook wel genoemd? 🤔",
      answer: "Een dikke boomer. 😎"
    },
    krista: {
      question: "Het is grijs en er worden dingen van gemaakt…",
      answer: "Staal! 🔩"
    }
  };

  function showEgg(name) {
    const egg = eggs[name];
    document.getElementById('eggQuestion').textContent = egg.question;
    document.getElementById('eggAnswer').textContent = egg.answer || '';
    const card = document.getElementById('eggCard');
    card.classList.remove('revealed');
    if (!egg.answer) card.style.cursor = 'default';
    else card.style.cursor = 'pointer';
    document.getElementById('eggOverlay').classList.add('show');
  }

  function revealAnswer() {
    const card = document.getElementById('eggCard');
    card.classList.add('revealed');
  }

  function closeEgg(e) {
    if (e.target === document.getElementById('eggOverlay')) {
      document.getElementById('eggOverlay').classList.remove('show');
    }
  }

  // Stars
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  const starEls = [];
  for (let i = 0; i < 140; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    star.style.cssText = `
      left: ${Math.random()*100}%;
      top: ${Math.random()*100}%;
      width: ${size}px;
      height: ${size}px;
      --d: ${(Math.random()*4+2).toFixed(1)}s;
      --op: ${(Math.random()*0.6+0.1).toFixed(2)};
      animation-delay: ${(Math.random()*6).toFixed(1)}s;
    `;
    document.getElementById('stars').parentElement.appendChild(star);
  }
  // Actually append to body
  document.querySelectorAll('.star').forEach(s => document.body.appendChild(s));

  // Petals
  const petalSymbols = ['🎾','🍼','🎾','🍼','🎾'];
  const container = document.getElementById('petals');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = petalSymbols[Math.floor(Math.random()*petalSymbols.length)];
    p.style.cssText = `
      left: ${Math.random()*100}%;
      font-size: ${(Math.random()*0.8+0.7).toFixed(1)}rem;
      animation-duration: ${(Math.random()*10+8).toFixed(1)}s;
      animation-delay: ${(Math.random()*12).toFixed(1)}s;
    `;
    container.appendChild(p);
  }

  // Audio
  const audio = document.getElementById('audio');
  const btn = document.getElementById('playBtn');
  const status = document.getElementById('playerStatus');
  const progressBar = document.getElementById('progressBar');
  let playing = false;

  // Autoplay: probeer direct, anders wacht op eerste klik
  let started = false;
  function startAudio() {
    if (started) return;
    started = true;
    audio.play().then(() => {
      playing = true;
      btn.textContent = '⏸';
      status.textContent = 'Speelt af…';
    });
  }

  window.addEventListener('load', () => {
    audio.play().then(() => {
      started = true;
      playing = true;
      btn.textContent = '⏸';
      status.textContent = 'Speelt af…';
    }).catch(() => {
      status.textContent = '♪ Tik ergens om te beginnen';
    });
  });

  function togglePlay() {
    if (playing) {
      audio.pause();
      btn.textContent = '▶';
      status.textContent = 'Gepauzeerd';
      playing = false;
    } else {
      audio.play();
      btn.textContent = '⏸';
      status.textContent = 'Speelt af…';
      playing = true;
    }
  }

  audio.addEventListener('timeupdate', () => {
    if (audio.duration) {
      progressBar.style.width = (audio.currentTime / audio.duration * 100) + '%';
    }
    updateKaraoke();
  });

  audio.addEventListener('timeupdate', () => {
  console.log(Math.floor(audio.currentTime));
  });

  audio.addEventListener('ended', () => {
    btn.textContent = '▶';
    status.textContent = 'Klaar';
    progressBar.style.width = '100%';
    playing = false;
  });
</script>
</body>
</html>
